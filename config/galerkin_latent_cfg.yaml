model:
  backbone: "Galerkin_Transformer"
  config: "config/model_config/Galerkin_Transformer.yaml"
  hc: "config/hc_config/mean_correction_cfg.yaml"
  args:
    n_hidden: 256
    n_heads: 8
    n_layers: 6
    mlp_ratio: 2
    dropout: 0.15557814394885827
  hc_overrides:
    mode: "latent_head"
    latent_module: "blocks.-1.ln_3"
    latent_dim: 256
    correction_layers: 2
    correction_hidden: 192
    correction_act: "tanh"
    freeze_base: false

path:
  root_dir: "data/NavierStokes_V1e-5_N1200_T20"
  save_dir: "checkpoints/NavierStokes_V1e-5_N1200_T20/optuna_1"

data:
  ns_mode: "autoregressive"
  downsamplex: 1
  downsampley: 1
  ntrain: 1000
  ntest: 200
  T_in: 10
  T_out: 10

hyper_parameters:
  num_epochs: 100
  batch_size: 4
  optimizer: "adamw"
  max_steps: null
  learning_rate: 0.0023381056322343496
  weight_decay: 1e-5
  scheduler: "OneCycleLR"
  pct_start: 0.3
  step_size: 100
  gamma: 0.5
  max_grad_norm: null
  teacher_forcing: 1
  val_size: 100
  val_split_seed: 42
  early_stopping:
    enabled: true
    patience: 10
    min_delta: 0.0
    monitor: "val_rel_l2"

wandb_logging:
  wandb: true
  project: "hc_fluid"
  run_name: "gt_latent_head_1"
  log_every: 100
  image_log_every: 10
